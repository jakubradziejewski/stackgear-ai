# fly.toml app configuration file generated for stackgear-ai on 2026-04-14T21:29:51+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stackgear-ai'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  sticky_sessions = true

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
